spring.application.name=opentele-stacktrace
server.port=5080
spring.jpa.hibernate.ddl-auto=update
logging.level.root=INFO
logging.level.com.opentele.stacktrace=DEBUG
logging.level.io.opentelemetry=INFO

# Redis Configuration for Data Persistence
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=60000ms
spring.data.redis.jedis.pool.max-active=8
spring.data.redis.jedis.pool.max-idle=8
spring.data.redis.jedis.pool.min-idle=0
spring.data.redis.jedis.pool.max-wait=-1ms

# Swagger/SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.display-request-duration=true
springdoc.swagger-ui.display-operation-id=true
