spring.application.name=opentele-stacktrace-test
server.port=5080
logging.level.root=INFO
logging.level.com.opentele.stacktrace=DEBUG
logging.level.io.opentelemetry=INFO

# Redis Configuration with short timeouts for tests
spring.data.redis.host=localhost
spring.data.redis.port=6379
spring.data.redis.timeout=1000ms
spring.data.redis.jedis.pool.max-active=1
spring.data.redis.jedis.pool.max-idle=0
spring.data.redis.jedis.pool.min-idle=0
spring.data.redis.connect-timeout=500ms

# Redis connection fail grace handling
spring.redis.ssl=false

# Disable Redis persistence for tests if needed
spring.data.redis.database=0

# Swagger/SpringDoc OpenAPI Configuration
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.enabled=true
